name: testing docker login 
on: 
  workflow_dispatch:

jobs:
  set-output:
    runs-on: self-hosted
    outputs:
      docker-login: ${{ steps.docker.outputs.docker-login }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: set docker username 
        id: docker
        run: |
          echo "docker-login=${{ secrets.DOCKER_USERNAME }}" >> $GITHUB_OUTPUT

  user-outputs:
    runs-on: self-hosted
    needs: set-output
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: docker login 
        uses: docker/login-action@v2 
        with: 
          username: ${{ needs.set-output.outputs.docker-login }} 
          password: ${{ secrets.DOCKER_PASSWORD }}
