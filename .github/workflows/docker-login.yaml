name: Testing Docker Login

on:
  workflow_dispatch:

jobs:
  set-output:
    runs-on: self-hosted

    outputs:
      docker-login: ${{ steps.docker.outputs.login }}

    steps:
      - uses: actions/checkout@v4

      - id: docker
        run: |
          echo "login=${{ vars.DOCKER_USERNAME }}" >> "$GITHUB_OUTPUT"
          

  use-output:
    runs-on: self-hosted
    needs: set-output

    steps:
      - uses: actions/checkout@v4
      - name: Check output
        run: |
          echo "Username: '${{ needs.set-output.outputs.docker-login }}'"
      

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ needs.set-output.outputs.docker-login }}
          password: ${{ secrets.DOCKER_PASSWORD }}
