name: Auto Merge Dependabot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'maxwell134'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Enable auto merge with retry
        run: |
          #!/bin/bash
          set -e
          
          PR_NUMBER=${{ github.event.pull_request.number }}
          MAX_ATTEMPTS=3
          ATTEMPT=1
          DELAY=10
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            if gh pr merge $PR_NUMBER --merge --auto; then
              echo "Auto-merge enabled successfully"
              exit 0
            fi
            
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "Auto-merge failed. Waiting ${DELAY}s before retry..."
              sleep $DELAY
              DELAY=$((DELAY * 2))  # Exponential backoff
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          echo "Failed to enable auto-merge after $MAX_ATTEMPTS attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
