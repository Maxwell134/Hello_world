name: Create Issue on Failure

permissions:
  actions: read
  contents: read
  issues: write

on:
  workflow_run:
    workflows:
      - "Checking Docker Login"
    types:
      - completed

jobs:
  create-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
    
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Download logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log > workflow.log

      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Workflow Failed"
            echo
            echo "**Workflow:** ${{ github.event.workflow_run.name }}"
            echo
            echo "**Run:** ${{ github.event.workflow_run.html_url }}"
            echo
            echo "### Logs"
            echo '```'
            cat workflow.log
            echo '```'
          } > issue.md

          gh issue create \
            --title "Workflow Failed - ${{ github.event.workflow_run.name }}" \
            --body-file issue.md
